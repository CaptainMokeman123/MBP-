<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Modern Blocky Paint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #gameContainer { width: 960px; height: 600px; position: relative; }
    canvas { width: 100%; height: 100%; }
    #loading { color: #ffb700; font-family: sans-serif; font-size: 18px; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="loading">Loading... <span id="progress">0</span>%</div>

  <script src="Build-2/UnityLoader.js"></script>
  <script>
    var gameInstance = UnityLoader.instantiate("gameContainer", "Build-2/modern blocky paintv1.json", {
      onProgress: function(instance, progress) {
        document.getElementById("progress").innerText = Math.round(progress * 100);
        if (progress === 1) document.getElementById("loading").innerText = "Ready!";
      }
    });
  </script>
</body>
</html>
